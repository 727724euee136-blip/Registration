<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Symposium Registration Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>National Level Technical Symposium</h1>
    <p class="subtitle">Registration Form</p>

    <form>

        <div class="input-box">
            <label>Full Name</label>
            <input type="text" placeholder="Enter your full name" required>
        </div>

        <div class="input-box">
            <label>Email Address</label>
            <input type="email" placeholder="Enter your email" required>
        </div>

        <div class="input-box">
            <label>Phone Number</label>
            <input type="tel" placeholder="Enter your phone number" required>
        </div>

        <div class="input-box">
            <label>College Name</label>
            <input type="text" placeholder="Enter your college name" required>
        </div>

        <div class="input-box">
            <label>Department</label>
            <select required>
                <option value="">Select Department</option>
                <option>CSE</option>
                <option>IT</option>
                <option>ECE</option>
                <option>EEE</option>
                <option>MECH</option>
                <option>CIVIL</option>
            </select>
        </div>

        <div class="input-box">
            <label>Year of Study</label>
            <select required>
                <option value="">Select Year</option>
                <option>I Year</option>
                <option>II Year</option>
                <option>III Year</option>
                <option>IV Year</option>
            </select>
        </div>

        <div class="input-box">
            <label>Gender</label><br>

            <input type="radio" name="gender"> Male
            <input type="radio" name="gender"> Female
            <input type="radio" name="gender"> Other
        </div>

        <div class="input-box">
            <label>Events Interested</label><br>

            <input type="checkbox"> Paper Presentation<br>
            <input type="checkbox"> Project Expo<br>
            <input type="checkbox"> Technical Quiz<br>
            <input type="checkbox"> Coding Contest<br>
            <input type="checkbox"> Poster Presentation
        </div>

        <div class="input-box">
            <label>Date of Birth</label>
            <input type="date">
        </div>

        <div class="input-box">
            <label>Upload Abstract / Resume</label>
            <input type="file">
        </div>

        <div class="input-box">
            <label>Address</label>
            <textarea rows="4" placeholder="Enter your address"></textarea>
        </div>

        <div class="input-box">
            <label>Additional Comments</label>
            <textarea rows="3" placeholder="Your comments"></textarea>
        </div>

        <div class="btn-group">
            <input type="submit" value="Register">
            <input type="reset" value="Reset">
        </div>

    </form>

</div>

</body>
</html>
